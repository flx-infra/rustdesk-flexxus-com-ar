version: '3.6'

services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    # -r: host del RELAY (hbbr) para los clientes | -k _: exige key de encriptación
    command: hbbs -r ${RUSTDESK_RELAY_HOST} -k _
    deploy:
      placement:
        constraints: ["${NODE}"]
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    environment:
      - TZ=America/Argentina/Cordoba
    # mode: host -> evita el ingress mesh (SNAT) de Swarm; preserva la IP real
    # del cliente, imprescindible para el hole-punching P2P.
    ports:
      - target: 21115
        published: 21115
        protocol: tcp
        mode: host
      - target: 21116
        published: 21116
        protocol: tcp
        mode: host
      - target: 21116
        published: 21116
        protocol: udp
        mode: host
      - target: 21118
        published: 21118
        protocol: tcp
        mode: host
    volumes:
      - rustdesk_data:/root    # persiste la Key (id_ed25519) y la DB
    networks:
      - rustdesk
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hbbr:
    image: rustdesk/rustdesk-server:latest
    command: hbbr -k _
    deploy:
      placement:
        constraints: ["${NODE}"]
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    environment:
      - TZ=America/Argentina/Cordoba
    ports:
      - target: 21117
        published: 21117
        protocol: tcp
        mode: host
      - target: 21119
        published: 21119
        protocol: tcp
        mode: host
    volumes:
      - rustdesk_data:/root    # mismo volumen que hbbs -> comparten la Key
    networks:
      - rustdesk
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  rustdesk_data:
    name: "${SERVICE_NAME}_data"

networks:
  rustdesk:
    driver: overlay
    attachable: true
